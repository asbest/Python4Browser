<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM in Browser</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        #chat-container::-webkit-scrollbar {
            width: 8px;
        }
        #chat-container::-webkit-scrollbar-track {
            background: #1f2937;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        #chat-container::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
        /* Markdown styles */
        .prose pre {
            background-color: #1f2937;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            border: 1px solid #374151;
        }
        .prose code {
            background-color: #374151;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: monospace;
        }
        .prose pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            border: none;
        }
        .prose p {
            margin-bottom: 0.75rem;
        }
        .prose p:last-child {
            margin-bottom: 0;
        }
        .prose a {
            color: #60a5fa;
            text-decoration: underline;
        }
        .prose ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .prose ol {
            list-style-type: decimal;
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col h-screen overflow-hidden">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 p-2 sm:p-4 flex flex-col sm:flex-row justify-between items-center z-20 gap-2">
        <div class="flex items-center justify-between w-full sm:w-auto">
            <div class="flex items-center space-x-2">
                <button id="sidebar-toggle-btn" class="text-gray-300 hover:text-white p-2 rounded hover:bg-gray-700 transition-colors" title="Toggle Sidebar">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 class="text-lg sm:text-xl font-bold text-white">LLM4Browser</h1>
            </div>
            <!-- Mobile load button -->
            <button id="load-btn-mobile" class="sm:hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors text-xs">
                Load
            </button>
        </div>

        <div class="flex items-center space-x-2 sm:space-x-4 overflow-x-auto w-full sm:w-auto pb-2 sm:pb-0 scrollbar-hide">
            <button id="settings-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-2 sm:px-3 rounded transition-colors text-xs sm:text-sm shrink-0" title="Settings">
                ⚙️ <span class="hidden xs:inline">Settings</span>
            </button>
            <div class="flex items-center space-x-1 sm:space-x-2 border-r border-gray-600 pr-2 sm:pr-4 mr-1 sm:mr-2 shrink-0">
                <button id="save-chat-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-2 sm:px-3 rounded transition-colors text-xs sm:text-sm" title="Save Chat as JSON">
                    💾 <span class="hidden xs:inline">JSON</span>
                </button>
                <button id="export-md-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-2 sm:px-3 rounded transition-colors text-xs sm:text-sm" title="Export Chat as Markdown">
                    📄 <span class="hidden xs:inline">MD</span>
                </button>
            </div>
            <label for="load-chat-input" class="cursor-pointer bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-2 sm:px-3 rounded transition-colors text-xs sm:text-sm shrink-0" title="Load Chat">
                📂 <span class="hidden xs:inline">Load</span>
            </label>
            <input type="file" id="load-chat-input" class="hidden" accept=".json">
            <div class="flex items-center space-x-1 sm:space-x-2 border-r border-gray-600 pr-2 sm:pr-4 mr-1 sm:mr-2 shrink-0">
                <label for="context-size-input" class="text-xs text-gray-300 hidden md:inline">Context:</label>
                <input type="number" id="context-size-input" class="bg-gray-700 text-white rounded p-1 sm:p-2 text-xs sm:text-sm w-16 sm:w-24 focus:outline-none" min="1" placeholder="Auto">
            </div>
            <select id="model-selector" class="bg-gray-700 text-white rounded p-1 sm:p-2 text-xs sm:text-sm focus:outline-none min-w-[120px] max-w-[150px] sm:max-w-none">
                <option value="">Loading models...</option>
            </select>
            <button id="load-btn" class="hidden sm:inline bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors text-sm shrink-0">
                Load Model
            </button>
        </div>
    </header>

    <div class="flex-grow flex overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col transition-all duration-300 overflow-hidden hidden sm:flex">
            <div class="p-4 border-b border-gray-700">
                <button id="new-chat-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors flex items-center justify-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    <span>New Chat</span>
                </button>
            </div>
            <div id="chat-list" class="flex-grow overflow-y-auto p-2 space-y-2">
                <!-- Chat sessions will be appended here -->
            </div>
        </aside>

    <!-- Main -->
    <main class="flex-grow flex flex-col p-4 overflow-hidden relative max-w-4xl w-full mx-auto">
        <!-- Settings Modal -->
        <div id="settings-modal" class="hidden absolute top-0 left-0 w-full h-full bg-gray-900 bg-opacity-75 z-30 flex items-center justify-center p-4">
            <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 w-full max-w-lg shadow-xl relative flex flex-col max-h-full">
                <h2 class="text-xl font-bold text-white mb-4">Settings</h2>
                <div class="space-y-4 overflow-y-auto flex-grow pr-2">
                    <div>
                        <label class="block text-sm text-gray-300 mb-1">System Prompt</label>
                        <textarea id="sys-prompt-input" rows="3" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-sm text-white focus:outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-300 mb-1">Temperature (<span id="temp-val">1.0</span>)</label>
                        <input type="range" id="temp-input" min="0" max="2" step="0.1" value="1.0" class="w-full">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-300 mb-1">Top-P (<span id="top-p-val">1.0</span>)</label>
                        <input type="range" id="top-p-input" min="0" max="1" step="0.05" value="1.0" class="w-full">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-300 mb-1">Repetition Penalty (<span id="rep-pen-val">1.0</span>)</label>
                        <input type="range" id="rep-pen-input" min="1" max="2" step="0.05" value="1.0" class="w-full">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-300 mb-1">Max Tokens</label>
                        <input type="number" id="max-tokens-input" placeholder="e.g. 1024" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-sm text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-300 mb-1">Backend</label>
                        <select id="backend-selector" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-sm text-white focus:outline-none">
                            <option value="webllm">WebLLM (WebGPU)</option>
                            <option value="transformers">Transformers.js (CPU/WASM)</option>
                        </select>
                    </div>
                    <div class="flex items-center space-x-2 pt-2">
                        <input type="checkbox" id="use-cpu-input" class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500">
                        <label for="use-cpu-input" class="text-sm text-gray-300">Use CPU (Slow / Fallback)</label>
                    </div>
                </div>
                <div class="mt-6 flex justify-end">
                    <button id="close-settings-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Close</button>
                </div>
            </div>
        </div>

        <!-- Progress -->
        <div id="progress-container" class="absolute top-4 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-gray-800 border border-gray-700 rounded-lg p-4 shadow-lg hidden z-10">
            <p id="progress-text" class="text-sm text-center mb-2">Loading Model...</p>
            <div class="w-full bg-gray-700 rounded-full h-2.5">
                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-grow overflow-y-auto mb-4 bg-gray-800 rounded-lg p-4 border border-gray-700 space-y-4 flex flex-col">
            <div class="text-center text-gray-400 mt-4">
                Select a model and click "Load Model" to begin. (The first download may take some time)
            </div>
        </div>

        <!-- Input Area -->
        <div class="flex flex-col space-y-2">
            <!-- Attachment Preview -->
            <div id="attachment-preview" class="hidden flex items-center justify-between bg-gray-700 rounded p-2 text-sm">
                <span id="attachment-filename" class="text-gray-300 truncate mr-2"></span>
                <button id="remove-attachment-btn" class="text-red-400 hover:text-red-300 font-bold px-2 py-1 rounded" title="Remove Attachment">
                    ✕
                </button>
            </div>

            <div class="flex items-end space-x-2">
                <input type="file" id="attach-file-input" class="hidden" accept=".txt,.md,.csv,.js,.py,.html,.json,.xml,.css,.log">
                <button id="attach-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-4 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center" disabled title="Attach File">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M8 4a3 3 0 00-3 3v4a5 5 0 0010 0V7a1 1 0 112 0v4a7 7 0 11-14 0V7a5 5 0 0110 0v4a3 3 0 11-6 0V7a1 1 0 012 0v4a1 1 0 102 0V7a3 3 0 00-3-3z" clip-rule="evenodd" />
                    </svg>
                </button>
                <button id="mic-btn" class="bg-gray-600 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center" disabled title="Dictate">
                    🎙️
                </button>
                <textarea id="user-input" rows="1" class="flex-grow bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-hidden" placeholder="Type a message..." disabled></textarea>
                <button id="stop-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition-colors hidden disabled:opacity-50 disabled:cursor-not-allowed" title="Stop generation">
                    Stop
                </button>
                <button id="send-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Send
                </button>
            </div>
        </div>
    </main>
    </div>

    <script type="module">
        import { CreateMLCEngine, prebuiltAppConfig } from "https://esm.run/@mlc-ai/web-llm";
        import { pipeline, TextStreamer } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.2.1";

        const loadBtn = document.getElementById('load-btn');
        const loadBtnMobile = document.getElementById('load-btn-mobile');
        const modelSelector = document.getElementById('model-selector');
        const progressContainer = document.getElementById('progress-container');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const saveChatBtn = document.getElementById('save-chat-btn');
        const exportMdBtn = document.getElementById('export-md-btn');
        const loadChatInput = document.getElementById('load-chat-input');
        const attachBtn = document.getElementById('attach-btn');
        const attachFileInput = document.getElementById('attach-file-input');
        const attachmentPreview = document.getElementById('attachment-preview');
        const attachmentFilename = document.getElementById('attachment-filename');
        const removeAttachmentBtn = document.getElementById('remove-attachment-btn');
        const stopBtn = document.getElementById('stop-btn');
        const micBtn = document.getElementById('mic-btn');
        const contextSizeInput = document.getElementById('context-size-input');
        const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
        const sidebar = document.getElementById('sidebar');
        const newChatBtn = document.getElementById('new-chat-btn');
        const chatList = document.getElementById('chat-list');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        const sysPromptInput = document.getElementById('sys-prompt-input');
        const tempInput = document.getElementById('temp-input');
        const tempVal = document.getElementById('temp-val');
        const topPInput = document.getElementById('top-p-input');
        const topPVal = document.getElementById('top-p-val');
        const repPenInput = document.getElementById('rep-pen-input');
        const repPenVal = document.getElementById('rep-pen-val');
        const maxTokensInput = document.getElementById('max-tokens-input');
        const useCPUInput = document.getElementById('use-cpu-input');
        const backendSelector = document.getElementById('backend-selector');

        class TransformersEngine {
            constructor(modelId, pipeline) {
                this.modelId = modelId;
                this.pipe = pipeline;
                this.chat = {
                    completions: {
                        create: this.createCompletion.bind(this)
                    }
                };
            }

            async *createCompletion(options) {
                const messages = options.messages;
                const stream = options.stream;
                const temperature = options.temperature || 1.0;
                const top_p = options.top_p || 1.0;
                const max_tokens = options.max_tokens || 1024;

                let fullText = "";
                const callback = (text) => {
                    fullText += text;
                };

                const streamer = new TextStreamer(this.pipe.tokenizer, {
                    skip_prompt: true,
                    callback_function: callback,
                });

                // Convert OpenAI messages to Transformers.js format if necessary
                // Most modern models use a chat template
                const inputs = this.pipe.tokenizer.apply_chat_template(messages, {
                    tokenize: false,
                    add_generation_prompt: true,
                });

                const promise = this.pipe(inputs, {
                    max_new_tokens: max_tokens,
                    temperature: temperature,
                    top_p: top_p,
                    do_sample: temperature > 0,
                    streamer: streamer,
                    return_full_text: false,
                });

                if (stream) {
                    let lastLength = 0;
                    while (true) {
                        if (fullText.length > lastLength) {
                            const delta = fullText.slice(lastLength);
                            lastLength = fullText.length;
                            yield {
                                choices: [{
                                    delta: { content: delta }
                                }]
                            };
                        }
                        // Check if finished
                        // This is a bit tricky with the pipeline API directly
                        // But since we are in an async generator, we can wait a bit or use a better signal
                        // For now, let's wait for the promise to resolve
                        const result = await Promise.race([promise, new Promise(r => setTimeout(() => r('timeout'), 50))]);
                        if (result !== 'timeout') {
                             // Final yield if any
                             if (fullText.length > lastLength) {
                                yield { choices: [{ delta: { content: fullText.slice(lastLength) } }] };
                             }
                             break;
                        }
                    }
                } else {
                    const output = await promise;
                    yield {
                        choices: [{
                            message: { content: output[0].generated_text }
                        }]
                    };
                }
            }

            interruptGenerate() {
                // Transformers.js doesn't have a direct interrupt for pipeline yet in v3
                // but we could try to flag the streamer
                console.warn("Interrupt not yet supported for Transformers.js backend");
            }
        }

        let appSettings = JSON.parse(localStorage.getItem('LLM4BrowserSettings')) || {
            sysPrompt: "You are a helpful AI assistant.",
            temperature: 1.0,
            top_p: 1.0,
            repetition_penalty: 1.0,
            max_tokens: null,
            selectedModel: null,
            contextSize: null,
            useCPU: false,
            backend: 'webllm'
        };

        let engine = null;
        let attachedFileName = null;
        let currentChatId = Date.now().toString();
        let attachedFileContent = null;
        // Enforce High-Performance GPU if possible or Fallback CPU
        if (navigator.gpu) {
            const originalRequestAdapter = navigator.gpu.requestAdapter.bind(navigator.gpu);
            navigator.gpu.requestAdapter = async function(options) {
                let newOptions;
                if (appSettings.useCPU) {
                    newOptions = Object.assign({}, options, { forceFallbackAdapter: true });
                } else {
                    newOptions = Object.assign({}, options, { powerPreference: "high-performance" });
                }
                let adapter = await originalRequestAdapter(newOptions);
                if (!adapter && appSettings.useCPU) {
                    console.warn("Fallback CPU adapter not found, trying low-power...");
                    adapter = await originalRequestAdapter(Object.assign({}, options, { powerPreference: "low-power" }));
                }
                return adapter;
            };
        } else {
             const gpuWarning = "⚠️ WebGPU is not supported in this browser. Mobile devices often require specific browsers (e.g., Chrome on Android) or enabling experimental flags. CPU mode still requires WebGPU support (via software fallback).";
             addMessage("system", gpuWarning);
             console.error(gpuWarning);
        }

        let messages = [
            { role: "system", content: appSettings.sysPrompt }
        ];

        // --- Sidebar & DB Management ---
        sidebarToggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
        });

        const dbName = 'LLM4BrowserDB';
        const storeName = 'chats';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(storeName)) {
                        db.createObjectStore(storeName, { keyPath: 'id' });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveChatSession() {
            if (messages.length <= 1) return; // Don't save empty chats
            const titleMsg = messages.find(m => m.role === 'user');
            const title = titleMsg ? titleMsg.content.substring(0, 30) + '...' : 'New Chat';
            const chatObj = { id: currentChatId, title, messages, updatedAt: Date.now() };

            const db = await openDB();
            const tx = db.transaction(storeName, 'readwrite');
            tx.objectStore(storeName).put(chatObj);
            await new Promise(r => tx.oncomplete = r);
            renderChatList();
        }

        async function loadChatSession(id) {
            const db = await openDB();
            const tx = db.transaction(storeName, 'readonly');
            const store = tx.objectStore(storeName);
            const request = store.get(id);

            return new Promise((resolve) => {
                request.onsuccess = () => {
                    const data = request.result;
                    if (data) {
                        currentChatId = data.id;
                        messages = data.messages;
                        chatContainer.innerHTML = '';
                        messages.forEach((msg, idx) => {
                            if (msg.role !== 'system') addMessage(msg.role, msg.content, idx);
                        });
                        addMessage('system', 'Chat session loaded.');
                        if (window.innerWidth < 640) sidebar.classList.add('hidden');
                    }
                    resolve();
                };
            });
        }

        async function deleteChatSession(id) {
            const db = await openDB();
            const tx = db.transaction(storeName, 'readwrite');
            tx.objectStore(storeName).delete(id);
            await new Promise(r => tx.oncomplete = r);
            if (currentChatId === id) {
                newChat();
            }
            renderChatList();
        }

        async function renderChatList() {
            chatList.innerHTML = '';
            const db = await openDB();
            const tx = db.transaction(storeName, 'readonly');
            const store = tx.objectStore(storeName);
            const request = store.getAll();

            request.onsuccess = () => {
                const chats = request.result.sort((a, b) => b.updatedAt - a.updatedAt);
                chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = `p-2 rounded cursor-pointer flex justify-between items-center group transition-colors ${chat.id === currentChatId ? 'bg-gray-700' : 'hover:bg-gray-700'}`;

                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'truncate text-sm text-gray-300 group-hover:text-white flex-grow';
                    titleSpan.textContent = chat.title;
                    titleSpan.onclick = () => loadChatSession(chat.id);

                    const delBtn = document.createElement('button');
                    delBtn.className = 'text-red-400 opacity-0 group-hover:opacity-100 px-2 py-1 text-xs transition-opacity';
                    delBtn.innerHTML = '🗑️';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteChatSession(chat.id);
                    };

                    div.appendChild(titleSpan);
                    div.appendChild(delBtn);
                    chatList.appendChild(div);
                });
            };
        }

        function newChat() {
            currentChatId = Date.now().toString();
            messages = [{ role: "system", content: appSettings.sysPrompt }];
            chatContainer.innerHTML = '';
            addMessage('system', 'Started a new chat.');
            renderChatList();
            if (window.innerWidth < 640) sidebar.classList.add('hidden');
        }

        newChatBtn.addEventListener('click', newChat);

        // Initial render
        renderChatList();


        // --- Settings Persistence ---
        function saveSettings() {
            appSettings.sysPrompt = sysPromptInput.value;
            appSettings.temperature = parseFloat(tempInput.value);
            appSettings.top_p = parseFloat(topPInput.value);
            appSettings.repetition_penalty = parseFloat(repPenInput.value);
            appSettings.max_tokens = maxTokensInput.value ? parseInt(maxTokensInput.value) : null;
            appSettings.selectedModel = modelSelector.value;
            appSettings.contextSize = contextSizeInput.value ? parseInt(contextSizeInput.value) : null;
            appSettings.useCPU = useCPUInput.checked;
            appSettings.backend = backendSelector.value;
            localStorage.setItem('LLM4BrowserSettings', JSON.stringify(appSettings));

            // update system prompt in current chat if it is a new chat
            if (messages.length === 1 && messages[0].role === 'system') {
                messages[0].content = appSettings.sysPrompt;
            }
        }

        settingsBtn.addEventListener('click', () => {
            sysPromptInput.value = appSettings.sysPrompt;
            tempInput.value = appSettings.temperature;
            tempVal.textContent = appSettings.temperature.toFixed(1);
            topPInput.value = appSettings.top_p;
            topPVal.textContent = appSettings.top_p.toFixed(2);
            repPenInput.value = appSettings.repetition_penalty;
            repPenVal.textContent = appSettings.repetition_penalty.toFixed(2);
            maxTokensInput.value = appSettings.max_tokens || '';
            useCPUInput.checked = !!appSettings.useCPU;
            backendSelector.value = appSettings.backend || 'webllm';
            settingsModal.classList.remove('hidden');
        });

        closeSettingsBtn.addEventListener('click', () => {
            saveSettings();
            settingsModal.classList.add('hidden');
        });

        tempInput.addEventListener('input', () => tempVal.textContent = parseFloat(tempInput.value).toFixed(1));
        topPInput.addEventListener('input', () => topPVal.textContent = parseFloat(topPInput.value).toFixed(2));
        repPenInput.addEventListener('input', () => repPenVal.textContent = parseFloat(repPenInput.value).toFixed(2));


        // Dynamically load models at startup
        function updateModelSelector() {
            const backend = appSettings.backend || 'webllm';
            modelSelector.innerHTML = '';

            if (backend === 'webllm') {
                const availableModels = prebuiltAppConfig.model_list.map(m => m.model_id);
                availableModels.forEach(modelId => {
                    const option = document.createElement('option');
                    option.value = modelId;
                    option.textContent = modelId;
                    modelSelector.appendChild(option);
                });
            } else if (backend === 'transformers') {
                const transformersModels = [
                    'onnx-community/Qwen2.5-0.5B-Instruct',
                    'onnx-community/Llama-3.2-1B-Instruct',
                    'onnx-community/SmolLM2-135M-Instruct',
                    'onnx-community/phi-4-mini-instruct-ONNX'
                ];
                transformersModels.forEach(modelId => {
                    const option = document.createElement('option');
                    option.value = modelId;
                    option.textContent = modelId;
                    modelSelector.appendChild(option);
                });
            }

            if (appSettings.selectedModel) {
                modelSelector.value = appSettings.selectedModel;
            }
        }

        updateModelSelector();
        if (appSettings.contextSize) {
            contextSizeInput.value = appSettings.contextSize;
        }

        async function updateContextSizeMax() {
            const selectedModelId = modelSelector.value;
            if (!selectedModelId) return;

            const modelConfig = prebuiltAppConfig.model_list.find(m => m.model_id === selectedModelId);
            if (!modelConfig) return;

            let maxContext = null;
            if (modelConfig.overrides && modelConfig.overrides.context_window_size) {
                maxContext = modelConfig.overrides.context_window_size;
            } else {
                try {
                    const res = await fetch(`${modelConfig.model}/resolve/main/mlc-chat-config.json`);
                    if (res.ok) {
                        const json = await res.json();
                        if (json.context_window_size) {
                            maxContext = json.context_window_size;
                        }
                    }
                } catch (e) {
                    console.warn("Failed to fetch model config:", e);
                }
            }

            if (maxContext) {
                contextSizeInput.placeholder = maxContext;
                contextSizeInput.title = `Default: ${maxContext}`;
            } else {
                contextSizeInput.placeholder = "Auto";
                contextSizeInput.removeAttribute('title');
            }
        }

        modelSelector.addEventListener('change', updateContextSizeMax);
        // Call initially
        updateContextSizeMax();

        // --- Save / Load / Export Chat ---
        saveChatBtn.addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(messages));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href",     dataStr);
            downloadAnchorNode.setAttribute("download", "chat_history.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        exportMdBtn.addEventListener('click', () => {
            let mdContent = "# LLM4Browser Chat Export\n\n";
            messages.forEach(msg => {
                if (msg.role === 'system') {
                    mdContent += `> **System:** ${msg.content}\n\n`;
                } else if (msg.role === 'user') {
                    mdContent += `**User:**\n${msg.content}\n\n`;
                } else if (msg.role === 'assistant') {
                    mdContent += `**Assistant:**\n${msg.content}\n\n`;
                }
            });

            const dataStr = "data:text/markdown;charset=utf-8," + encodeURIComponent(mdContent);
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "chat_export.md");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        loadChatInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const loadedMessages = JSON.parse(event.target.result);
                    if (Array.isArray(loadedMessages)) {
                        messages = loadedMessages;

                        // Clear the chat container
                        chatContainer.innerHTML = '';

                        // Re-render messages
                        messages.forEach((msg, idx) => {
                            if (msg.role !== 'system') { // skip default system prompt for visual clutter
                                addMessage(msg.role, msg.content, idx);
                            }
                        });
                        addMessage('system', 'Chat loaded successfully.');
                    } else {
                        addMessage('system', 'Error: Invalid file format.');
                    }
                } catch (err) {
                    addMessage('system', 'Error loading file: ' + err.message);
                }
            };
            reader.readAsText(file);

            // Reset input so the same file can be loaded again if needed
            e.target.value = null;
        });

        // --- File Attachment ---
        attachBtn.addEventListener('click', () => {
            attachFileInput.click();
        });

        attachFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                attachedFileName = file.name;
                attachedFileContent = event.target.result;
                attachmentFilename.textContent = attachedFileName;
                attachmentPreview.classList.remove('hidden');
            };
            reader.readAsText(file);

            e.target.value = null;
        });

        function clearAttachment() {
            attachedFileName = null;
            attachedFileContent = null;
            attachmentPreview.classList.add('hidden');
            attachmentFilename.textContent = '';
        }

        removeAttachmentBtn.addEventListener('click', clearAttachment);

        // --- Speech Recognition ---
        let recognition = null;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value += (userInput.value ? ' ' : '') + transcript;
                userInput.style.height = 'auto';
                userInput.style.height = (userInput.scrollHeight) + 'px';
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                micBtn.classList.remove('bg-red-600', 'animate-pulse');
                micBtn.classList.add('bg-gray-600');
            };

            recognition.onend = () => {
                micBtn.classList.remove('bg-red-600', 'animate-pulse');
                micBtn.classList.add('bg-gray-600');
            };
        } else {
            micBtn.title = "Speech recognition not supported in this browser.";
        }

        micBtn.addEventListener('click', () => {
            if (recognition) {
                if (micBtn.classList.contains('bg-red-600')) {
                    recognition.stop();
                } else {
                    recognition.start();
                    micBtn.classList.remove('bg-gray-600');
                    micBtn.classList.add('bg-red-600', 'animate-pulse');
                }
            }
        });

        stopBtn.addEventListener('click', () => {
            if (engine) {
                engine.interruptGenerate();
            }
        });

        modelSelector.addEventListener('change', () => {
            updateContextSizeMax();
            saveSettings();
        });
        backendSelector.addEventListener('change', () => {
            appSettings.backend = backendSelector.value;
            updateModelSelector();
            saveSettings();
        });
        contextSizeInput.addEventListener('input', saveSettings);

        async function initiateModelLoad() {
            const selectedModel = modelSelector.value;
            const backend = appSettings.backend || 'webllm';
            saveSettings();
            loadBtn.disabled = true;
            if (loadBtnMobile) loadBtnMobile.disabled = true;
            modelSelector.disabled = true;
            contextSizeInput.disabled = true;
            progressContainer.classList.remove('hidden');
            chatContainer.innerHTML = '';
            messages = [{ role: "system", content: appSettings.sysPrompt }];

            const initProgressCallback = (progress) => {
                // Handle different progress formats
                if (typeof progress === 'string') {
                    progressText.textContent = progress;
                } else {
                    progressText.textContent = progress.text || progress.status || "Loading...";
                    if (progress.progress !== undefined) {
                        progressBar.style.width = `${progress.progress * 100}%`;
                    } else if (progress.loaded && progress.total) {
                        progressBar.style.width = `${(progress.loaded / progress.total) * 100}%`;
                    }
                }
            };

            try {
                if (backend === 'webllm') {
                    const chatOpts = {};
                    const userContextSize = parseInt(contextSizeInput.value);
                    if (!isNaN(userContextSize) && userContextSize > 0) {
                        chatOpts.context_window_size = userContextSize;
                    }
                    engine = await CreateMLCEngine(selectedModel, { initProgressCallback }, chatOpts);
                } else {
                    const pipe = await pipeline('text-generation', selectedModel, {
                        device: 'wasm',
                        progress_callback: initProgressCallback
                    });
                    engine = new TransformersEngine(selectedModel, pipe);
                }

                progressContainer.classList.add('hidden');
                const cpuLabel = (appSettings.useCPU || backend === 'transformers') ? " (CPU)" : "";
                addMessage("system", `Model ${selectedModel}${cpuLabel} loaded successfully! You can now chat.`);
                userInput.disabled = false;
                sendBtn.disabled = false;
                attachBtn.disabled = false;
                micBtn.disabled = false;
                userInput.focus();
                loadBtn.disabled = false;
                if (loadBtnMobile) loadBtnMobile.disabled = false;
                modelSelector.disabled = false;
                contextSizeInput.disabled = false;
            } catch (err) {
                progressText.textContent = `Error: ${err.message}`;
                progressBar.classList.replace('bg-blue-600', 'bg-red-600');
                progressBar.style.width = '100%';
                loadBtn.disabled = false;
                if (loadBtnMobile) loadBtnMobile.disabled = false;
                modelSelector.disabled = false;
                contextSizeInput.disabled = false;
                console.error(err);
            }
        }

        loadBtn.addEventListener('click', initiateModelLoad);
        if (loadBtnMobile) loadBtnMobile.addEventListener('click', initiateModelLoad);

        function addMessage(role, content, index = null) {
            const msgContainer = document.createElement('div');
            msgContainer.className = `flex flex-col group w-full ${role === 'user' ? 'items-end' : role === 'system' ? 'items-center' : 'items-start'}`;

            const msgDiv = document.createElement('div');

            if (role === 'user') {
                msgDiv.className = 'p-3 rounded-lg max-w-[80%] bg-blue-600 text-white prose prose-invert break-words';
            } else if (role === 'system') {
                msgDiv.className = 'p-3 rounded-lg bg-gray-700 text-gray-400 text-sm prose prose-invert break-words text-center';
            } else {
                msgDiv.className = 'p-3 rounded-lg max-w-[80%] bg-gray-700 text-gray-100 prose prose-invert break-words relative';
            }

            msgDiv.innerHTML = marked.parse(content);
            msgContainer.appendChild(msgDiv);

            // Action Bar
            if (role !== 'system') {
                const actionBar = document.createElement('div');
                actionBar.className = `opacity-0 group-hover:opacity-100 transition-opacity flex space-x-2 mt-1 text-xs text-gray-400 ${role === 'user' ? 'mr-1' : 'ml-1'}`;

                // Copy Button
                const copyBtn = document.createElement('button');
                copyBtn.textContent = '📋 Copy';
                copyBtn.className = 'hover:text-white transition-colors';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(content).then(() => {
                        copyBtn.textContent = '✅ Copied';
                        setTimeout(() => copyBtn.textContent = '📋 Copy', 2000);
                    });
                };
                actionBar.appendChild(copyBtn);

                if (role === 'assistant') {
                    const speakBtn = document.createElement('button');
                    speakBtn.textContent = '🔊 Read';
                    speakBtn.className = 'hover:text-white transition-colors';
                    speakBtn.onclick = () => {
                        if ('speechSynthesis' in window) {
                            if (window.speechSynthesis.speaking) {
                                window.speechSynthesis.cancel();
                            } else {
                                const utterance = new SpeechSynthesisUtterance(content);
                                window.speechSynthesis.speak(utterance);
                            }
                        } else {
                            alert("Text-to-Speech not supported in this browser.");
                        }
                    };
                    actionBar.appendChild(speakBtn);
                }

                if (role === 'user' && index !== null) {
                    const editBtn = document.createElement('button');
                    editBtn.textContent = '✏️ Edit';
                    editBtn.className = 'hover:text-white transition-colors';
                    editBtn.onclick = () => {
                        const originalText = messages[index].content;
                        // Determine the start of the attached file, if any
                        let textToEdit = originalText;
                        const match = originalText.match(/^Attached file '(.*?)':\n```\n([\s\S]*?)\n```\n\n/);
                        if (match) {
                           textToEdit = originalText.substring(match[0].length);
                        }

                        userInput.value = textToEdit;
                        userInput.focus();
                        userInput.style.height = 'auto';
                        userInput.style.height = (userInput.scrollHeight) + 'px';

                        // Truncate messages array
                        messages = messages.slice(0, index);

                        // Re-render chat
                        chatContainer.innerHTML = '';
                        messages.forEach((msg, idx) => {
                            if (msg.role !== 'system') addMessage(msg.role, msg.content, idx);
                        });
                        saveChatSession();
                    };
                    actionBar.appendChild(editBtn);
                }

                if (role === 'assistant' && (index === messages.length - 1 || index === messages.length) && index !== null) {
                    const regenBtn = document.createElement('button');
                    regenBtn.textContent = '🔄 Regenerate';
                    regenBtn.className = 'hover:text-white transition-colors';
                    regenBtn.onclick = () => {
                        messages.pop(); // remove last assistant message
                        msgContainer.remove(); // remove it from UI
                        saveChatSession();
                        handleSend(true); // trigger send again without new input
                    };
                    actionBar.appendChild(regenBtn);
                }

                msgContainer.appendChild(actionBar);
            }

            chatContainer.appendChild(msgContainer);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv; // return the inner div for streaming updates
        }

        async function handleSend(isRegenerate = false) {
            let text = userInput.value.trim();
            if (!isRegenerate && (!text && !attachedFileContent)) return;
            if (!engine) return;

            if (!isRegenerate) {
                userInput.value = '';
                userInput.style.height = 'auto'; // reset height
                userInput.disabled = true;

                let messageContent = text;
                let displayContent = text;

                if (attachedFileContent) {
                    const fileContext = `Attached file '${attachedFileName}':\n\`\`\`\n${attachedFileContent}\n\`\`\`\n\n`;
                    messageContent = fileContext + text;
                    displayContent = `*(Attached file: ${attachedFileName})*\n\n` + text;
                }

                messages.push({ role: "user", content: messageContent });
                addMessage("user", displayContent, messages.length - 1);
                clearAttachment();
            } else {
                userInput.disabled = true;
            }

            sendBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            attachBtn.disabled = true;

            const assistantIndex = messages.length;
            const replyDiv = addMessage("assistant", "", assistantIndex);

            try {
                const chatOpts = {
                    messages,
                    stream: true,
                    temperature: appSettings.temperature,
                    top_p: appSettings.top_p,
                    repetition_penalty: appSettings.repetition_penalty,
                };
                if (appSettings.max_tokens) {
                    chatOpts.max_tokens = appSettings.max_tokens;
                }

                const chunks = await engine.chat.completions.create(chatOpts);

                let replyText = "";
                for await (const chunk of chunks) {
                    replyText += chunk.choices[0]?.delta.content || "";
                    replyDiv.innerHTML = marked.parse(replyText);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                messages.push({ role: "assistant", content: replyText });
                saveChatSession();
            } catch (err) {
                if (err.message.includes("interrupt")) {
                    replyDiv.textContent += "\n\n*(Generation aborted)*";
                } else {
                    replyDiv.textContent = `Error: ${err.message}`;
                    replyDiv.classList.add('text-red-400');
                }
            } finally {
                userInput.disabled = false;
                stopBtn.classList.add('hidden');
                sendBtn.classList.remove('hidden');
                attachBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
            if (userInput.scrollHeight > 150) {
                userInput.style.overflowY = 'auto';
            } else {
                userInput.style.overflowY = 'hidden';
            }
        });
    </script>
</body>
</html>
