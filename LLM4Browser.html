<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM im Browser</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        #chat-container::-webkit-scrollbar {
            width: 8px;
        }
        #chat-container::-webkit-scrollbar-track {
            background: #1f2937;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        #chat-container::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col h-screen overflow-hidden">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-white">LLM4Browser</h1>
        <div class="flex items-center space-x-4">
            <select id="model-selector" class="bg-gray-700 text-white rounded p-2 text-sm focus:outline-none">
                <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B (Schnell)</option>
                <option value="Llama-3.1-8B-Instruct-q4f32_1-MLC">Llama 3.1 8B (Besser)</option>
                <option value="Qwen2-0.5B-Instruct-q4f16_1-MLC">Qwen2 0.5B (Sehr Schnell)</option>
            </select>
            <button id="load-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors text-sm">
                Modell laden
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-grow flex flex-col p-4 overflow-hidden relative max-w-4xl w-full mx-auto">
        <!-- Progress -->
        <div id="progress-container" class="absolute top-4 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-gray-800 border border-gray-700 rounded-lg p-4 shadow-lg hidden z-10">
            <p id="progress-text" class="text-sm text-center mb-2">Lade Modell...</p>
            <div class="w-full bg-gray-700 rounded-full h-2.5">
                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-grow overflow-y-auto mb-4 bg-gray-800 rounded-lg p-4 border border-gray-700 space-y-4 flex flex-col">
            <div class="text-center text-gray-400 mt-4">
                Wählen Sie ein Modell und klicken Sie auf "Modell laden", um zu beginnen. (Der erste Download kann einige Zeit dauern)
            </div>
        </div>

        <!-- Input Area -->
        <div class="flex items-end space-x-2">
            <textarea id="user-input" rows="1" class="flex-grow bg-gray-800 border border-gray-700 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-hidden" placeholder="Schreiben Sie eine Nachricht..." disabled></textarea>
            <button id="send-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Senden
            </button>
        </div>
    </main>

    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        const loadBtn = document.getElementById('load-btn');
        const modelSelector = document.getElementById('model-selector');
        const progressContainer = document.getElementById('progress-container');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let engine = null;
        let messages = [
            { role: "system", content: "Du bist ein hilfreicher KI-Assistent." }
        ];

        loadBtn.addEventListener('click', async () => {
            const selectedModel = modelSelector.value;
            loadBtn.disabled = true;
            modelSelector.disabled = true;
            progressContainer.classList.remove('hidden');
            chatContainer.innerHTML = '';
            messages = [{ role: "system", content: "Du bist ein hilfreicher KI-Assistent." }];

            const initProgressCallback = (progress) => {
                progressText.textContent = progress.text;
                if (progress.progress !== undefined) {
                    progressBar.style.width = `${progress.progress * 100}%`;
                }
            };

            try {
                engine = await CreateMLCEngine(selectedModel, { initProgressCallback });
                progressContainer.classList.add('hidden');
                addMessage("system", `Modell ${selectedModel} erfolgreich geladen! Sie können nun chatten.`);
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            } catch (err) {
                progressText.textContent = `Fehler: ${err.message}`;
                progressBar.classList.replace('bg-blue-600', 'bg-red-600');
                progressBar.style.width = '100%';
                loadBtn.disabled = false;
                modelSelector.disabled = false;
            }
        });

        function addMessage(role, content) {
            const msgDiv = document.createElement('div');

            if (role === 'user') {
                msgDiv.className = 'p-3 rounded-lg max-w-[80%] bg-blue-600 ml-auto text-white whitespace-pre-wrap break-words';
            } else if (role === 'system') {
                msgDiv.className = 'p-3 rounded-lg bg-gray-700 text-center mx-auto text-gray-400 text-sm whitespace-pre-wrap break-words';
            } else {
                msgDiv.className = 'p-3 rounded-lg max-w-[80%] bg-gray-700 mr-auto text-gray-100 whitespace-pre-wrap break-words';
            }

            msgDiv.textContent = content;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            userInput.value = '';
            userInput.style.height = 'auto'; // reset height
            userInput.disabled = true;
            sendBtn.disabled = true;

            addMessage("user", text);
            messages.push({ role: "user", content: text });

            const replyDiv = addMessage("assistant", "");

            try {
                const chunks = await engine.chat.completions.create({
                    messages,
                    stream: true,
                });

                let replyText = "";
                for await (const chunk of chunks) {
                    replyText += chunk.choices[0]?.delta.content || "";
                    replyDiv.textContent = replyText;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                messages.push({ role: "assistant", content: replyText });
            } catch (err) {
                replyDiv.textContent = `Fehler: ${err.message}`;
                replyDiv.classList.add('text-red-400');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
            if (userInput.scrollHeight > 150) {
                userInput.style.overflowY = 'auto';
            } else {
                userInput.style.overflowY = 'hidden';
            }
        });
    </script>
</body>
</html>
